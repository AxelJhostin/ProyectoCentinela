name: centinela
description: Proyecto Centinela — alertas comunitarias hiperlocales (MVP).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.2.1
  supabase_flutter: ^2.9.1
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  google_fonts: ^6.2.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  shared_preferences: ^2.5.3
  path: ^1.9.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - env/app.env
